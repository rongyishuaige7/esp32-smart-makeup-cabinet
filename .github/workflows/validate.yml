name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: esp32-smart-makeup-cabinet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Repository, firmware and Flutter client
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Set up PlatformIO Core
        run: python -m pip install --disable-pip-version-check platformio==6.1.19

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.41.2'
          cache: true
          cache-key: flutter-3.41.2-${{ runner.os }}-${{ hashFiles('mobile/smart_cabinet_app/pubspec.lock') }}

      - name: Run publication and source-contract gates
        run: |
          python scripts/secret_scan.py
          python scripts/check_repo.py
          python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Build ESP32 firmware
        run: pio run -d firmware -e esp32dev -e esp32dev-experimental-compile -e esp32dev-actuators-only-compile

      - name: Validate Flutter client
        working-directory: mobile/smart_cabinet_app
        run: |
          flutter pub get --enforce-lockfile
          dart format --output=none --set-exit-if-changed lib test
          flutter test
          flutter analyze
          flutter build apk --debug
