[env:esp32dev]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit SSD1306@2.5.17
    adafruit/DHT sensor library@1.4.7
    miguelbalboa/MFRC522@1.4.12
    fastled/FastLED@3.10.3
    bblanchon/ArduinoJson@6.21.6
    madhephaestus/ESP32Servo@3.2.1

# Compile-only coverage for the explicitly opt-in teaching paths. This environment
# is never uploaded by the release gate or CI and does not supply Wi-Fi credentials.
[env:esp32dev-experimental-compile]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -D ENABLE_EXPERIMENTAL_ACTUATORS=1
    -D ENABLE_EXPERIMENTAL_LOCAL_CONTROL=1
    -D ENABLE_EXPERIMENTAL_RFID_MAINTENANCE=1

lib_deps =
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit SSD1306@2.5.17
    adafruit/DHT sensor library@1.4.7
    miguelbalboa/MFRC522@1.4.12
    fastled/FastLED@3.10.3
    bblanchon/ArduinoJson@6.21.6
    madhephaestus/ESP32Servo@3.2.1

# Compile-only negative coverage: enabling only the actuator macro must still
# leave the derived physical-output predicate disabled. This environment is
# never uploaded and supplies neither Wi-Fi credentials nor hardware access.
[env:esp32dev-actuators-only-compile]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -D ENABLE_EXPERIMENTAL_ACTUATORS=1
    -D ENABLE_EXPERIMENTAL_LOCAL_CONTROL=0
    -D ENABLE_EXPERIMENTAL_RFID_MAINTENANCE=0

lib_deps =
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit SSD1306@2.5.17
    adafruit/DHT sensor library@1.4.7
    miguelbalboa/MFRC522@1.4.12
    fastled/FastLED@3.10.3
    bblanchon/ArduinoJson@6.21.6
    madhephaestus/ESP32Servo@3.2.1
